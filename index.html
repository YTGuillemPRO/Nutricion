<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salut | Benestar Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --accent: #8bc34a;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-gradient: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-dark);
            overflow: hidden;
        }

        /* Contenedor con efecto cristal */
        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            color: var(--primary);
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 45px;
            font-size: 18px;
            font-weight: 300;
        }

        /* Layout de tarjetas en Grid */
        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Estilo específico para cada tarjeta */
        .digestio {
            background: linear-gradient(135deg, #2e7d32, #43a047);
        }

        .nutricio {
            background: linear-gradient(135deg, #558b2f, #7cb342);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.3);
        }

        .icon-wrapper {
            background: rgba(255, 255, 255, 0.2);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 15px;
            font-size: 28px;
            transition: transform 0.3s ease;
        }

        .card:hover .icon-wrapper {
            transform: scale(1.2);
        }

        .card span {
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            color: #999;
            font-weight: 400;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive para móviles */
        @media (max-width: 480px) {
            .menu {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Portal de Salut</h1>
            <p class="subtitle">La teva guia cap a un benestar integral</p>
        </header>

        <nav class="menu">
            <a class="card digestio" href="timthumb-alt.jpeg">
                <div class="icon-wrapper">🫃</div>
                <span>Digestió</span>
            </a>

            <a class="card nutricio" href="nutricio.html">
                <div class="icon-wrapper">🥗</div>
                <span>Nutrició</span>
            </a>
        </nav>

        <footer>
            &copy; 2026 Portal de Salut &bull; Compromís amb la vida
        </footer>
    </div>

</body>
</html>
