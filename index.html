<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salut | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --discord: #5865F2;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #e8f5e9, #ffffff, #c8e6c9);
            overflow: hidden;
        }

        /* Fondo decorativo */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            top: -50px;
            left: -50px;
            z-index: 0;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            max-width: 750px;
            width: 92%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 10;
            position: relative;
        }

        header {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
            font-weight: 400;
        }

        /* Grid System */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            position: relative;
            padding: 45px 30px;
            border-radius: 28px;
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .bg-dig { background: linear-gradient(135deg, #2e7d32, #66bb6a); }
        .bg-nut { background: linear-gradient(135deg, #558b2f, #9ccc65); }
        .bg-teoria { background: linear-gradient(135deg, #1976d2, #64b5f6); }
        .bg-activitats { background: linear-gradient(135deg, #f57c00, #ffb74d); }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover .icon-circle {
            transform: rotate(-10deg) scale(1.1);
        }

        .card span {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Botón Estilo Discord */
        .discord-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--discord);
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
            transition: all 0.2s ease-in-out;
            z-index: 100;
        }

        .discord-btn:hover {
            border-radius: 8px; /* Cambio de forma estilo Discord */
            background: #4752c4;
            transform: translateY(-3px);
        }

        .btn-back {
            grid-column: 1 / -1;
            background: transparent;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            color: #777;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f1f8e9;
        }

        .hidden { display: none; }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <header>
            <h1 id="title">Portal de Salut</h1>
            <p class="subtitle" id="subtitle">Explora la biologia humana des de l'IE Temple</p>
        </header>

        <div class="menu-grid" id="main-menu">
            <button class="card bg-dig" onclick="openSub('digestio')">
                <div class="icon-circle">🫃</div>
                <span>Digestió</span>
            </button>
            <button class="card bg-nut" onclick="openSub('nutricio')">
                <div class="icon-circle">🥗</div>
                <span>Nutrició</span>
            </button>
        </div>

        <div class="menu-grid hidden" id="sub-digestio">
            <a href="timthumb-alt.jpeg" class="card bg-teoria">
                <div class="icon-circle">📖</div>
                <span>Teoria</span>
            </a>
            <a href="activitats-digestio.html" class="card bg-activitats">
                <div class="icon-circle">✏️</div>
                <span>Activitats</span>
            </a>
            <button class="btn-back" onclick="goMain()">← Tornar al menú</button>
        </div>

        <div class="menu-grid hidden" id="sub-nutricio">
            <a href="teoria-nutricio.html" class="card bg-teoria">
                <div class="icon-circle">📚</div>
                <span>Teoria</span>
            </a>
            <a href="activitats-nutricio.html" class="card bg-activitats">
                <div class="icon-circle">🍎</div>
                <span>Activitats</span>
            </a>
            <button class="btn-back" onclick="goMain()">← Tornar al menú</button>
        </div>
    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="discord-btn">
        <span style="font-size: 20px;">🏛️</span>
        Més informació de l'Institut
    </a>

    <script>
        function openSub(type) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('sub-' + type).classList.remove('hidden');
            document.getElementById('title').innerText = type.charAt(0).toUpperCase() + type.slice(1);
            document.getElementById('subtitle').innerText = "Selecciona una modalitat d'aprenentatge";
        }

        function goMain() {
            document.getElementById('sub-digestio').classList.add('hidden');
            document.getElementById('sub-nutricio').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('title').innerText = "Portal de Salut";
            document.getElementById('subtitle').innerText = "Explora la biologia humana des de l'IE Temple";
        }
    </script>
</body>
</html>
