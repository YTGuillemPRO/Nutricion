<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPortal | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #2ecc71;
            --accent-dark: #27ae60;
            --discord: #5865F2;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            background: #0f172a; /* Fons fosc profund professional */
            background-image: 
                radial-gradient(at 0% 0%, rgba(46, 204, 113, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 152, 219, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Contenidor Estil Dashboard */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 48px;
            padding: 60px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            text-align: center;
            color: #1d1d1f;
            position: relative;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 { font-size: 56px; font-weight: 800; letter-spacing: -2.5px; margin-bottom: 8px; color: #1d1d1f; }
        .tagline { font-size: 19px; color: #515154; margin-bottom: 50px; font-weight: 400; }

        /* Grid de Selecció */
        .selection-area { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .big-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .big-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .icon-wrap {
            width: 100px;
            height: 100px;
            background: #f5f5f7;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .big-card:hover .icon-wrap { background: #e8f5e9; transform: rotate(-5deg); }
        .big-card h2 { font-size: 28px; font-weight: 700; color: #1d1d1f; }

        /* Estil dels Botons de Teoria/Activitat */
        .sub-menu { display: none; grid-template-columns: 1fr 1fr; gap: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn-pro {
            padding: 25px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }
        .btn-teoria { background: #0071e3; } /* Blau Apple */
        .btn-jocs { background: #ff9500; }   /* Taronja Apple */
        .btn-pro:hover { filter: brightness(1.1); transform: scale(1.05); }

        .back-link {
            margin-top: 40px;
            display: inline-block;
            color: #86868b;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 50px;
        }
        .back-link:hover { background: rgba(0,0,0,0.05); color: #1d1d1f; }

        /* Botó Discord (Petit, elegant i a la dreta) */
        .discord-pill {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--discord);
            color: white;
            padding: 16px 28px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .discord-pill:hover { border-radius: 12px; transform: scale(1.1) rotate(2deg); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-panel" id="panel">
        <div id="home-view">
            <h1>BioPortal</h1>
            <p class="tagline">IE Temple · Ciències de la Naturalesa 2026</p>
            
            <div class="selection-area">
                <div class="big-card" onclick="nav('digestio')">
                    <div class="icon-wrap">🍔</div>
                    <h2>Digestió</h2>
                </div>
                <div class="big-card" onclick="nav('nutricio')">
                    <div class="icon-wrap">🥗</div>
                    <h2>Nutrició</h2>
                </div>
            </div>
        </div>

        <div id="section-view" class="hidden">
            <h1 id="section-title">Secció</h1>
            <p class="tagline">Tria com vols continuar el teu aprenentatge</p>
            
            <div class="sub-menu" id="sub-menu-grid" style="display: grid;">
                <a href="#" id="link-teoria" class="btn-pro btn-teoria">📖 Teoria</a>
                <a href="#" id="link-joc" class="btn-pro btn-jocs">🎮 Activitats</a>
            </div>

            <div class="back-link" onclick="back()">← Tornar al menú principal</div>
        </div>
    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="discord-pill">
        <span style="font-size: 24px;">🏛️</span>
        Institut IE Temple
    </a>

    <script>
        function nav(type) {
            const panel = document.getElementById('panel');
            panel.style.opacity = '0';
            panel.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('section-view').classList.remove('hidden');
                
                const title = document.getElementById('section-title');
                const linkT = document.getElementById('link-teoria');
                const linkJ = document.getElementById('link-joc');

                if(type === 'digestio') {
                    title.innerText = "La Digestió";
                    linkT.href = "timthumb-alt.jpeg";
                    linkJ.href = "activitats-digestio.html";
                } else {
                    title.innerText = "La Nutrició";
                    linkT.href = "teoria-nutricio.html";
                    linkJ.href = "activitats-nutricio.html";
                }

                panel.style.opacity = '1';
                panel.style.transform = 'scale(1)';
                
                // Tirar una mica de confeti al canviar de secció
                confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            }, 300);
        }

        function back() {
            const panel = document.getElementById('panel');
            panel.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('section-view').classList.add('hidden');
                document.getElementById('home-view').classList.remove('hidden');
                panel.style.opacity = '1';
            }, 300);
        }
    </script>
</body>
</html>
