<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faig 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #2ecc71;
            --discord: #5865F2;
            --glass: rgba(255, 255, 255, 0.8);
            --bg-dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(46, 204, 113, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 152, 219, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #1d1d1f;
        }

        /* Panell Principal Estil Apple */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 48px;
            padding: 60px;
            width: 90%;
            max-width: 850px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 { font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
        .subtitle { font-size: 19px; color: #515154; margin-bottom: 45px; }

        /* Grelha de Navegació */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .nav-card {
            background: white;
            padding: 50px 30px;
            border-radius: 35px;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .icon-circle {
            width: 90px;
            height: 90px;
            background: #f5f5f7;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .nav-card:hover .icon-circle { background: #e8f5e9; transform: rotate(-5deg); }
        .nav-card h2 { font-size: 26px; font-weight: 700; }

        /* Seccions Internes */
        .view { display: none; animation: slideUp 0.5s ease; }
        .active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .btn-action {
            padding: 25px;
            border-radius: 22px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            color: white;
            transition: 0.3s;
        }
        .btn-teo { background: #0071e3; } /* Blau Apple */
        .btn-joc { background: #ff9500; } /* Taronja Apple */
        .btn-action:hover { filter: brightness(1.1); transform: scale(1.05); }

        .back-btn {
            margin-top: 40px;
            display: inline-block;
            color: #86868b;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 50px;
        }
        .back-btn:hover { background: rgba(0,0,0,0.05); color: #1d1d1f; }

        /* Botó Discord Institut */
        .insti-pill {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--discord);
            color: white;
            padding: 16px 28px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 30px rgba(88,101,242,0.3);
            transition: 0.3s;
        }
        .insti-pill:hover { border-radius: 12px; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="glass-panel" id="main-panel">
        
        <div id="home-view" class="view active">
            <h1>BioPortal</h1>
            <p class="subtitle">IE Temple · Explora el cos humà amb IA</p>
            <div class="main-grid">
                <div class="nav-card" onclick="navTo('digestio')">
                    <div class="icon-circle">🍔</div>
                    <h2>Digestió</h2>
                </div>
                <div class="nav-card" onclick="navTo('nutricio')">
                    <div class="icon-circle">🥗</div>
                    <h2>Nutrició</h2>
                </div>
            </div>
        </div>

        <div id="selection-view" class="view">
            <h1 id="selection-title">Títol</h1>
            <p class="subtitle">Tria una activitat per començar</p>
            <div class="btn-group">
                <a href="#" id="link-teoria" class="btn-action btn-teo">📖 Teoria Visual</a>
                <a href="#" id="link-joc" class="btn-action btn-joc">🎮 Joc Interactiu</a>
            </div>
            <div class="back-btn" onclick="goBack()">← Tornar al menú principal</div>
        </div>

    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="insti-pill" id="confettiBtn">
        <span>🏛️</span> IE Temple
    </a>

    <script>
        // Sistema de Navegació Professional
        function navTo(type) {
            const panel = document.getElementById('main-panel');
            panel.style.opacity = '0';
            panel.style.transform = 'scale(0.95)';

            setTimeout(() => {
                document.getElementById('home-view').classList.remove('active');
                document.getElementById('selection-view').classList.add('active');
                
                const title = document.getElementById('selection-title');
                const tLink = document.getElementById('link-teoria');
                const jLink = document.getElementById('link-joc');

                if(type === 'digestio') {
                    title.innerText = "Digestió";
                    tLink.href = "teoria-digestio.html";
                    jLink.href = "activitats-digestio.html";
                } else {
                    title.innerText = "Nutrició";
                    tLink.href = "teoria-nutricio.html"; // Recorda crear aquest arxiu
                    jLink.href = "activitats-nutricio.html";
                }

                panel.style.opacity = '1';
                panel.style.transform = 'scale(1)';
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            }, 300);
        }

        function goBack() {
            const panel = document.getElementById('main-panel');
            panel.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('selection-view').classList.remove('active');
                document.getElementById('home-view').classList.add('active');
                panel.style.opacity = '1';
            }, 300);
        }

        // Efecte extra al botó de l'insti
        document.getElementById('confettiBtn').addEventListener('mouseenter', () => {
            confetti({ particleCount: 15, colors: ['#5865F2', '#ffffff'], origin: {x: 0.9, y: 0.9} });
        });
    </script>
</body>
</html>
