<script>

/* =========================
   NAVEGACIÓN ENTRE VISTAS
========================= */

function navTo(type){

  const panel = document.getElementById('main-panel');

  panel.style.transform='scale(.95)';
  panel.style.opacity='0';

  setTimeout(()=>{

    document.getElementById('home-view').classList.remove('active');
    document.getElementById('selection-view').classList.add('active');

    const title=document.getElementById('selection-title');
    const t=document.getElementById('link-teoria');
    const j=document.getElementById('link-joc');

    if(type==='digestio'){
      title.innerText="Digestió";
      t.href="teoria-digestio.html";
      j.href="activitats-digestio.html";
    }else{
      title.innerText="Nutrició";
      t.href="teoria-nutricio.html";
      j.href="activitats-nutricio.html";
    }

    panel.style.transform='scale(1)';
    panel.style.opacity='1';

    confetti({
      particleCount:40,
      spread:60,
      origin:{y:.8}
    });

  },250);

}


function goBack(){

  const panel=document.getElementById('main-panel');

  panel.style.opacity='0';

  setTimeout(()=>{

    document.getElementById('selection-view').classList.remove('active');
    document.getElementById('home-view').classList.add('active');

    panel.style.opacity='1';

  },250);

}


/* =========================
   CONFETTI BOTÓN INSTITUTO
========================= */

document.getElementById("confettiBtn").addEventListener("mouseenter",()=>{

  confetti({
    particleCount:20,
    spread:40,
    origin:{x:.9,y:.9},
    colors:['#5865F2','#ffffff']
  });

});


/* =========================
   DATOS CURIOSOS COMIDA
========================= */

const foodFacts=[

"🍯 La mel no caduca mai.",
"🍌 Els plàtans són tècnicament una baia.",
"🍎 Una poma té més aire que aigua.",
"🍫 La xocolata pot millorar l'humor.",
"🥕 Les pastanagues ajuden a la visió nocturna.",
"🍍 La pinya conté enzims que ajuden a digerir proteïnes.",
"🥑 L'alvocat és una fruita.",
"🍓 Les maduixes tenen llavors per fora.",
"🍉 El cos humà és aproximadament 60% aigua.",
"🥦 El bròquil és molt ric en vitamina C."

];


function showFoodFact(){

  const factBox=document.getElementById("foodFact");

  if(!factBox) return;

  const fact=foodFacts[Math.floor(Math.random()*foodFacts.length)];

  factBox.innerText=fact;

}


/* mostrar al cargar */

window.addEventListener("load",showFoodFact);


/* cambiar cada 15s */

setInterval(showFoodFact,15000);


/* =========================
   MINI QUIZ
========================= */

function startFoodQuiz(){

const answer=prompt(

`🧠 MINI QUIZ

Quin òrgan comença la digestió?

A) Estómac
B) Boca
C) Intestí`

);

if(!answer) return;

if(answer.toLowerCase()=="b"){

  alert("✅ Correcte! La digestió comença a la boca.");

  confetti({
    particleCount:80,
    spread:70
  });

  addBioPoints(10);

}else{

  alert("❌ Incorrecte. La resposta correcta és la boca.");

}

}


/* =========================
   SISTEMA DE PUNTOS
========================= */

let bioPoints=0;

function addBioPoints(p){

bioPoints+=p;

console.log("⭐ Punts BioPortal:",bioPoints);

}


/* =========================
   BOTÓN SECRETO
========================= */

function bioSecret(){

confetti({

particleCount:200,
spread:120,
origin:{y:0.6}

});

alert("🍔 MODE MENJAR ACTIVAT");

addBioPoints(20);

}


/* =========================
   EFECTO 3D PANEL
========================= */

document.addEventListener("mousemove",(e)=>{

const panel=document.querySelector(".glass-panel");

if(!panel) return;

const x=(window.innerWidth/2 - e.pageX)/40;
const y=(window.innerHeight/2 - e.pageY)/40;

panel.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;

});

</script>
