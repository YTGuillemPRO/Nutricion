<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Joc: El Plat Màgic</title>
    <style>
        body { font-family: sans-serif; background: #fffde7; text-align: center; padding: 20px; }
        .plate { width: 250px; height: 250px; background: white; border: 10px solid #ddd; border-radius: 50%; margin: 20px auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; overflow: hidden; }
        .food-item { font-size: 40px; cursor: pointer; margin: 10px; transition: 0.2s; display: inline-block; }
        .food-item:hover { transform: scale(1.2); }
        .msg { font-weight: bold; font-size: 20px; color: #2e7d32; margin-top: 20px; }
        .inventory { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>🛸 Crea el teu Plat Súper-Saludable</h1>
    <p>Fes clic als aliments per posar-los al plat!</p>

    <div class="plate" id="plate">
        </div>

    <div class="inventory">
        <div class="food-item" onclick="add('🥦', 'ver')">🥦</div>
        <div class="food-item" onclick="add('🍅', 'ver')">🍅</div>
        <div class="food-item" onclick="add('🍗', 'pro')">🍗</div>
        <div class="food-item" onclick="add('🍝', 'hid')">🍝</div>
        <div class="food-item" onclick="add('🍎', 'ver')">🍎</div>
        <div class="food-item" onclick="add('🥚', 'pro')">🥚</div>
        <div class="food-item" onclick="add('🥖', 'hid')">🥖</div>
    </div>

    <div class="msg" id="m">El plat està buit...</div>
    <button onclick="location.reload()" style="margin-top:20px">Netejar plat</button>
    <br><br>
    <a href="index.html">← Tornar al menú</a>

    <script>
        let count = 0;
        function add(emoji, tipus) {
            if(count < 6) {
                const span = document.createElement('span');
                span.innerHTML = emoji;
                span.style.fontSize = "40px";
                document.getElementById('plate').appendChild(span);
                count++;
                
                if(count == 1) document.getElementById('m').innerText = "Molt bé! Posa'n més!";
                if(count == 3) document.getElementById('m').innerText = "Això fa bona pinta...";
                if(count == 6) document.getElementById('m').innerText = "🏆 PLAT PERFECTE! Ets un mestre de la nutrició!";
            }
        }
    </script>
</body>
</html>
